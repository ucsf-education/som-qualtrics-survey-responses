name: Deploy Pull Request

permissions:
  contents: read

on:
  pull_request_target:
    types: [labeled]

jobs:
  deploy:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
    if: contains(github.event.pull_request.labels.*.name, 'safe to deploy')
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          allow-unsafe-pr-checkout: true
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - name: install dependencies hoisted for lambda
        run: pnpm install --node-linker=hoisted
      - run: pnpm exec serverless package --stage dev
      - uses: actions/upload-artifact@v7
        with:
          name: dev-som-qualtrics-survey-responses.zip
          path: ./.serverless/som-qualtrics-survey-responses.zip
          if-no-files-found: error
          retention-days: 3
          compression-level: 0
      - run: pnpm exec serverless deploy --stage dev --package ./.serverless --conceal --verbose

  comment:
    permissions:
      issues: write
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/github-script@v9
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Preview build deployed to dev lambda stack."
            })
